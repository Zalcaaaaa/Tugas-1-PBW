<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SITTA UT - Login</title>
  <link rel="stylesheet" href="CSS/style.css" />
</head>

<body class="theme-dark auth-page">
  <main class="auth-wrap">
    <section class="auth-card" aria-label="Form Login SITTA">
      <div class="auth-brand">
        <img src="assets/logo-ut.png" alt="Logo Universitas Terbuka" class="auth-logo" />
        <h1 class="auth-title">SITTA - Sistem Informasi<br/>Tracking & Transaksi Ajar</h1>
      </div>

      <form id="loginForm" class="auth-form" autocomplete="on">
        <label for="email" class="auth-label">Email</label>
        <input id="email" name="email" type="email" class="auth-input"
               placeholder="contoh: admin@ut.ac.id" required />

        <label for="password" class="auth-label">Password</label>
        <input id="password" name="password" type="password" class="auth-input"
               placeholder="••••••••" required />

        <small id="loginError" class="form-error" aria-live="polite"></small>

        <button type="submit" class="btn btn-blue btn-block">Login</button>

        <div class="auth-links">
          <a href="#" class="link-muted">Lupa Password?</a>
          <a href="#" class="link-muted">Daftar</a>
        </div>
      </form>
    </section>
  </main>

  <script src="JS/script.js"></script>
  <script src="JS/data.js"></script>
  <script src="JS/apps.js"></script>
</body>
</html>
